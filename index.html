<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bunny API</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #e6edf3;
    padding: 20px;
  }
  .card {
    background: #161b22;
    border: 1px solid #22c55e33;
    border-radius: 14px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 0 30px #22c55e1a;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 22px;
    color: #22c55e;
  }
  p.sub {
    margin: 0 0 20px;
    color: #8b949e;
    font-size: 14px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #8b949e;
    margin: 14px 0 6px;
  }
  input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #22c55e; }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 11px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: #0d1117;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  pre {
    margin-top: 18px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>🐰 Bunny API</h1>
    <p class="sub">Enter your API key and text</p>

    <label for="key">API Key</label>
    <input id="key" type="text" placeholder="your key">

    <label for="text">Text</label>
    <input id="text" type="text" placeholder="hii">

    <button id="sendBtn" onclick="sendRequest()">Send</button>
    <pre id="output"></pre>
  </div>

<script>
async function sendRequest() {
  const key = document.getElementById('key').value.trim();
  const text = document.getElementById('text').value.trim();
  const btn = document.getElementById('sendBtn');
  const out = document.getElementById('output');

  if (!key || !text) {
    out.style.display = 'block';
    out.textContent = 'Please enter both key and text.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  out.style.display = 'block';
  out.textContent = 'Loading...';

  try {
    const res = await fetch(`/api?key=${encodeURIComponent(key)}&text=${encodeURIComponent(text)}`);
    const data = await res.json();
    out.textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    out.textContent = 'Error: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}
</script>
</body>
</html>
