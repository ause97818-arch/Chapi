<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA BOMBER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Poppins:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A2540;
    --navy-card: #0d2c4a;
    --navy-deep: #071a2e;
    --powder: #C7DDEB;
    --powder-soft: #9db9cc;
    --white: #ffffff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: var(--navy);
    color: var(--powder);
  }
  body { position: relative; min-height: 100vh; }

  /* ================= OVERLAYS ================= */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(7,26,46,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: var(--navy-card);
    border: 1px solid rgba(199,221,235,0.22);
    border-radius: 18px;
    padding: 30px 26px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0 0 22px;
    color: var(--white);
  }

  .card label {
    display: block;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--powder-soft);
    margin: 16px 0 8px;
  }

  .input {
    width: 100%;
    padding: 13px 15px;
    border-radius: 10px;
    border: 1px solid rgba(199,221,235,0.3);
    background: var(--navy-deep);
    color: var(--white);
    font-size: 14.5px;
    outline: none;
    font-family: 'Poppins', sans-serif;
  }
  .input:focus { border-color: var(--powder); }
  .input::placeholder { color: rgba(199,221,235,0.4); }
  .input:disabled { opacity: 0.5; }

  .btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    border-radius: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    border: 1px solid var(--powder);
    background: var(--powder);
    color: var(--navy);
  }
  .btn:hover { background: var(--white); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn:active { transform: translateY(1px); }

  .btn-outline {
    background: transparent;
    color: var(--powder);
    border: 1px solid var(--powder);
  }
  .btn-outline:hover { background: rgba(199,221,235,0.08); }

  /* close x */
  .close-x {
    position: absolute;
    top: 10px; right: 12px;
    width: 26px; height: 26px;
    background: transparent;
    border: 1px solid rgba(199,221,235,0.3);
    border-radius: 50%;
    color: var(--powder);
    font-size: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .close-x:hover { background: rgba(199,221,235,0.1); }

  /* icon circle (success / invalid) */
  .icon-wrap { display: flex; justify-content: center; margin: 4px 0 16px; }
  .icon-circle {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--powder);
    display: flex; align-items: center; justify-content: center;
  }
  .icon-circle svg { width: 26px; height: 26px; stroke: var(--powder); stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .icon-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--white);
    margin: 0;
  }

  /* ================= MAIN PAGE ================= */
  #mainPage { display: none; position: relative; z-index: 2; min-height: 100vh; }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--navy-card);
    border: 1px solid rgba(199,221,235,0.22);
    border-radius: 999px;
    padding: 6px 16px 6px 6px;
  }

  .logout-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--navy-card);
    border: 1px solid rgba(199,221,235,0.22);
    border-radius: 999px;
    padding: 9px 16px;
    color: var(--powder);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 11.5px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .logout-pill:hover { background: rgba(199,221,235,0.08); }
  .logout-pill svg { width: 14px; height: 14px; stroke: var(--powder); fill: none; stroke-width: 2; }

  .dp {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--navy);
    background: var(--powder);
  }
  .profile-info { font-size: 10.5px; line-height: 1.45; }
  .profile-name { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 12.5px; color: var(--white); letter-spacing: 0.5px; }
  .profile-meta { color: var(--powder-soft); white-space: nowrap; }
  .profile-meta b { color: var(--white); font-weight: 600; }

  .center-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 68px);
    padding: 20px 16px 40px;
  }

  .title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    color: var(--white);
    margin: 0 0 10px;
  }

  .warning-text {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--powder-soft);
    border: 1px solid rgba(199,221,235,0.25);
    padding: 8px 16px;
    border-radius: 999px;
    margin: 0 0 26px;
  }

  .attack-card {
    width: 100%;
    max-width: 420px;
    background: var(--navy-card);
    border: 1px solid rgba(199,221,235,0.22);
    border-radius: 18px;
    padding: 26px 22px;
  }

  .attack-card label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--powder-soft);
    margin: 0 0 8px;
  }

  .timer-display {
    display: none;
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    border-radius: 10px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    letter-spacing: 3px;
    background: var(--navy-deep);
    border: 1px solid rgba(199,221,235,0.3);
    color: var(--white);
  }

  .result-box {
    margin-top: 18px;
    display: none;
    border-radius: 10px;
    padding: 15px;
    background: var(--navy-deep);
    border: 1px solid rgba(199,221,235,0.18);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 260px;
    overflow-y: auto;
  }
  .k { color: var(--white); font-weight: 600; }
  .s { color: var(--powder); }
  .n { color: var(--powder-soft); }
  .b { color: var(--white); font-weight: 700; }

  .footer { text-align: center; margin-top: 22px; font-size: 11px; letter-spacing: 0.5px; color: var(--powder-soft); }
  .footer span { color: var(--white); font-weight: 600; }

  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid rgba(10,37,64,0.35);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  .btn-outline .spinner { border: 2px solid rgba(199,221,235,0.35); border-top-color: var(--powder); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ACTIVATION POPUP -->
<div id="activationOverlay" class="overlay">
  <div class="card">
    <h2>Ultra Bomber</h2>
    <label for="nameInput">Enter your name</label>
    <input id="nameInput" class="input" type="text" placeholder="Your name">
    <label for="keyActivateInput">Enter your active API key</label>
    <input id="keyActivateInput" class="input" type="text" placeholder="Your API key">
    <button id="activateBtn" class="btn">Activate</button>
  </div>
</div>

<!-- SUCCESS POPUP -->
<div id="successOverlay" class="overlay">
  <div class="card" style="position:relative;">
    <button id="closeSuccessBtn" class="close-x">✕</button>
    <div class="icon-wrap">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
    </div>
    <p class="icon-text">Key Successfuly Activated</p>
  </div>
</div>

<!-- INVALID KEY POPUP -->
<div id="invalidOverlay" class="overlay">
  <div class="card" style="position:relative;">
    <button id="closeInvalidBtn" class="close-x">✕</button>
    <div class="icon-wrap">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </div>
    </div>
    <p class="icon-text">Invalid API Key</p>
  </div>
</div>

<!-- STOP POPUP -->
<div id="stopPopup" class="overlay">
  <div class="card">
    <p style="margin:6px 0; font-size:13px;">TOTAL ATTACK TIME: <b id="totalTimeText" style="color:var(--white);"></b></p>
    <p style="margin:6px 0; font-size:13px;">TARGET: <b id="targetText" style="color:var(--white);"></b></p>
    <button id="stopOkBtn" class="btn">OK</button>
  </div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
  <div class="topbar">
    <button id="logoutBtn" class="logout-pill" type="button">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline>
        <line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
      Logout
    </button>

    <div class="pill">
      <div class="dp" id="dpCircle">?</div>
      <div class="profile-info">
        <div class="profile-name" id="profileName">Name</div>
        <div class="profile-meta">Exp: <b id="profileExpiry">—</b></div>
        <div class="profile-meta">Attacks: <b id="profileAttacks">0</b></div>
      </div>
    </div>
  </div>

  <div class="center-wrap">
    <h1 class="title">Ultra Bomber</h1>
    <div class="warning-text">Warning: use at your own risk</div>

    <div class="attack-card">
      <div id="inputGroup">
        <label for="victimInput">Enter your victim mobile number</label>
        <input id="victimInput" class="input" type="text" placeholder="+919876543210">
      </div>

      <button id="attackBtn" class="btn">Attack</button>

      <div id="timerDisplay" class="timer-display">00:00:00</div>

      <div id="responseBox" class="result-box"></div>
    </div>

    <div class="footer">Develope by <span>@th3bunny</span></div>
  </div>
</div>

<script>
const LS_NAME = 'bomber_name';
const LS_KEY = 'bomber_key';
const LS_EXPIRY = 'bomber_expiry';
const LS_ATTACKS = 'bomber_attacks';
const LS_ACTIVE = 'bomber_active';
const LS_START = 'bomber_start';
const LS_SESSION = 'bomber_session';
const LS_TARGET = 'bomber_target';

const $ = id => document.getElementById(id);
let timerInterval = null;

function initials(name) {
  return (name || '').trim().charAt(0).toUpperCase() || '?';
}

function formatHMS(ms) {
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const h = String(Math.floor(totalSec / 3600)).padStart(2, '0');
  const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, '0');
  const s = String(totalSec % 60).padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function updateTimer(startTs) {
  $('timerDisplay').textContent = formatHMS(Date.now() - startTs);
}

function startTimer(startTs) {
  $('timerDisplay').style.display = 'block';
  updateTimer(startTs);
  timerInterval = setInterval(() => updateTimer(startTs), 1000);
}

function stopTimerDisplay() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  $('timerDisplay').style.display = 'none';
}

function syntaxHighlight(json) {
  json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return json.replace(
    /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false)\b|null|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m => {
      let cls = 'n';
      if (/^"/.test(m)) cls = /:$/.test(m) ? 'k' : 's';
      else if (/true|false/.test(m)) cls = 'b';
      return '<span class="' + cls + '">' + m + '</span>';
    }
  );
}

function typeWriterEffect(el, text, speed = 6) {
  el.textContent = '';
  let i = 0;
  return new Promise(resolve => {
    function step() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
        el.scrollTop = el.scrollHeight;
        setTimeout(step, speed);
      } else {
        resolve();
      }
    }
    step();
  });
}

/* ---------------- Activation flow ---------------- */
$('activateBtn').addEventListener('click', async () => {
  const name = $('nameInput').value.trim();
  const key = $('keyActivateInput').value.trim();
  const btn = $('activateBtn');

  if (!name || !key) {
    alert('Please enter both name and API key');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Checking...';

  try {
    const res = await fetch(`/api?key=${encodeURIComponent(key)}`);
    const data = await res.json();

    if (data.message === 'text parameter required') {
      localStorage.setItem(LS_NAME, name);
      localStorage.setItem(LS_KEY, key);
      $('activationOverlay').style.display = 'none';
      $('successOverlay').style.display = 'flex';
    } else {
      $('activationOverlay').style.display = 'none';
      $('invalidOverlay').style.display = 'flex';
    }
  } catch (err) {
    alert('Network error, please try again: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Activate';
  }
});

$('closeInvalidBtn').addEventListener('click', () => {
  $('invalidOverlay').style.display = 'none';
  $('keyActivateInput').value = '';
  $('activationOverlay').style.display = 'flex';
});

$('closeSuccessBtn').addEventListener('click', () => {
  $('successOverlay').style.display = 'none';
  showMainPage();
});

function showMainPage() {
  const name = localStorage.getItem(LS_NAME) || 'User';
  const expiry = localStorage.getItem(LS_EXPIRY) || '—';
  const attacks = localStorage.getItem(LS_ATTACKS) || '0';

  $('dpCircle').textContent = initials(name);
  $('profileName').textContent = name;
  $('profileExpiry').textContent = expiry;
  $('profileAttacks').textContent = attacks;

  $('mainPage').style.display = 'block';

  if (localStorage.getItem(LS_ACTIVE) === 'true') {
    resumeAttackUI();
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const savedName = localStorage.getItem(LS_NAME);
  const savedKey = localStorage.getItem(LS_KEY);
  if (savedName && savedKey) {
    $('activationOverlay').style.display = 'none';
    showMainPage();
  } else {
    $('activationOverlay').style.display = 'flex';
  }
});

/* ---------------- Attack flow ---------------- */
function resumeAttackUI() {
  const start = parseInt(localStorage.getItem(LS_START), 10);
  $('inputGroup').style.display = 'none';
  const btn = $('attackBtn');
  btn.classList.add('btn-outline');
  btn.textContent = 'Stop';
  startTimer(start);
}

$('attackBtn').addEventListener('click', () => {
  const attacking = localStorage.getItem(LS_ACTIVE) === 'true';
  if (attacking) handleStop();
  else handleAttack();
});

async function handleAttack() {
  const key = localStorage.getItem(LS_KEY);
  const number = $('victimInput').value.trim();
  const btn = $('attackBtn');
  const out = $('responseBox');

  if (!number) {
    alert('Please enter victim mobile number');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending...';
  out.style.display = 'block';
  out.textContent = 'Loading...';

  try {
    const res = await fetch(`/api?key=${encodeURIComponent(key)}&text=${encodeURIComponent(number)}`);
    const data = await res.json();
    const jsonText = JSON.stringify(data, null, 2);
    await typeWriterEffect(out, jsonText, 6);
    out.innerHTML = syntaxHighlight(jsonText);

    if (data.status === true && data.session) {
      const startTs = Date.now();
      localStorage.setItem(LS_ACTIVE, 'true');
      localStorage.setItem(LS_START, String(startTs));
      localStorage.setItem(LS_SESSION, data.session);
      localStorage.setItem(LS_TARGET, number);
      if (data.key_expiry) {
        localStorage.setItem(LS_EXPIRY, data.key_expiry);
        $('profileExpiry').textContent = data.key_expiry;
      }
      $('inputGroup').style.display = 'none';
      btn.classList.add('btn-outline');
      btn.textContent = 'Stop';
      btn.disabled = false;
      startTimer(startTs);
    } else {
      btn.disabled = false;
      btn.textContent = 'Attack';
    }
  } catch (err) {
    out.textContent = 'Error: ' + err.message;
    btn.disabled = false;
    btn.textContent = 'Attack';
  }
}

async function handleStop() {
  const session = localStorage.getItem(LS_SESSION);
  const target = localStorage.getItem(LS_TARGET);
  const start = parseInt(localStorage.getItem(LS_START), 10);
  const btn = $('attackBtn');
  const out = $('responseBox');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Stopping...';

  try {
    const res = await fetch(`/api/dlt?session=${encodeURIComponent(session)}`);
    const data = await res.json();
    const jsonText = JSON.stringify(data, null, 2);
    await typeWriterEffect(out, jsonText, 6);
    out.innerHTML = syntaxHighlight(jsonText);
  } catch (err) {
    out.textContent = 'Error: ' + err.message;
  }

  stopTimerDisplay();
  const totalMs = Date.now() - start;

  const attacks = parseInt(localStorage.getItem(LS_ATTACKS) || '0', 10) + 1;
  localStorage.setItem(LS_ATTACKS, String(attacks));

  localStorage.removeItem(LS_ACTIVE);
  localStorage.removeItem(LS_START);
  localStorage.removeItem(LS_SESSION);
  localStorage.removeItem(LS_TARGET);

  $('totalTimeText').textContent = formatHMS(totalMs);
  $('targetText').textContent = target;
  $('stopPopup').style.display = 'flex';
}

$('stopOkBtn').addEventListener('click', () => {
  $('stopPopup').style.display = 'none';
  location.reload();
});

$('logoutBtn').addEventListener('click', () => {
  localStorage.clear();
  location.reload();
});
</script>
</body>
</html>
